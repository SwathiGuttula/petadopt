<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apply for Adoption – PetAdopt</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .apply-page { background: linear-gradient(135deg, var(--cream), var(--teal-pale)); min-height: 100vh; padding-bottom: 3rem; }
    .apply-header { background: var(--orange); color: white; padding: 2rem 1.5rem; text-align: center; }
    .apply-header h1 { font-size: 2rem; color: white; margin-bottom: 0.3rem; }
    .apply-header p { opacity: 0.9; }
    .apply-form-wrap { max-width: 680px; margin: 2.5rem auto; padding: 0 1.5rem; }
    .form-section { background: white; border-radius: var(--radius); padding: 2rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); }
    .form-section h2 { font-size: 1.2rem; color: var(--brown); margin-bottom: 1.2rem; padding-bottom: 0.8rem; border-bottom: 2px solid var(--orange-pale); display: flex; align-items: center; gap: 8px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media(max-width:600px){ .form-row { grid-template-columns: 1fr; } }
    .steps-indicator { display: flex; justify-content: center; gap: 1rem; padding: 1.5rem; flex-wrap: wrap; }
    .step-dot { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 700; color: var(--brown-light); }
    .step-dot.active { color: var(--orange); }
    .step-dot .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--orange-pale); }
    .step-dot.active .dot { background: var(--orange); }
    .success-card { text-align: center; background: white; border-radius: var(--radius); padding: 3rem 2rem; box-shadow: var(--shadow-hover); }
    .success-icon { font-size: 4rem; margin-bottom: 1rem; }
    .success-card h2 { font-size: 1.8rem; margin-bottom: 0.8rem; color: var(--brown); }
    .success-card p { color: var(--brown-light); margin-bottom: 1.5rem; }
  </style>
</head>
<body>
<div class="apply-page">
  <nav class="navbar" id="main-navbar"></nav>
  <div class="apply-header">
    <h1>🐾 Adoption Application</h1>
    <p id="apply-subtitle">Applying for a pet</p>
  </div>

  <div class="apply-form-wrap" id="apply-wrap">
    <div class="empty-state"><div class="paw-loader">🐾</div><p>Loading...</p></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const petId = params.get('id');
  let currentUser = null;
  let petData = null;

  async function init() {
    requireAuth(async user => {
      currentUser = user;
      if (!petId) { showToast('No pet selected', 'error'); return; }

      const doc = await db.collection('pets').doc(petId).get();
      if (!doc.exists) { showToast('Pet not found', 'error'); return; }
      petData = doc.data();
      document.getElementById('apply-subtitle').textContent = `Applying to adopt ${petData.name} from ${petData.shelterName}`;

      renderForm();
    });
  }

  function renderForm() {
    const userData = currentUser;
    document.getElementById('apply-wrap').innerHTML = `
      <form id="adoption-form">
        <div class="form-section">
          <h2>👤 Personal Information</h2>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Full Name *</label>
              <input class="form-control" id="f-name" required placeholder="Your full name"/>
            </div>
            <div class="form-group">
              <label class="form-label">Age *</label>
              <input class="form-control" id="f-age" type="number" min="18" required placeholder="Your age"/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Phone *</label>
              <input class="form-control" id="f-phone" required placeholder="+91 9876543210"/>
            </div>
            <div class="form-group">
              <label class="form-label">Email *</label>
              <input class="form-control" id="f-email" type="email" value="${currentUser.email}" required/>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h2>🏠 Housing Details</h2>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Home Type *</label>
              <select class="form-control" id="f-home-type" required>
                <option value="">Select home type</option>
                <option>Apartment</option>
                <option>Independent House</option>
                <option>Rented Flat</option>
                <option>Villa</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Do you have a yard/garden?</label>
              <select class="form-control" id="f-yard">
                <option>No</option>
                <option>Yes – small</option>
                <option>Yes – large</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Your Address *</label>
            <input class="form-control" id="f-address" required placeholder="Full address"/>
          </div>
          <div class="form-group">
            <label class="form-label">Does your landlord allow pets?</label>
            <select class="form-control" id="f-landlord">
              <option>Yes</option>
              <option>No</option>
              <option>I own the home</option>
              <option>Not sure yet</option>
            </select>
          </div>
        </div>

        <div class="form-section">
          <h2>🐾 Pet Experience</h2>
          <div class="form-group">
            <label class="form-label">Have you owned a pet before? *</label>
            <select class="form-control" id="f-prev-pet" required>
              <option value="">Select</option>
              <option>Yes – currently own one</option>
              <option>Yes – in the past</option>
              <option>No – first time</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Why do you want to adopt ${petData.name}?</label>
            <textarea class="form-control" id="f-reason" rows="3" placeholder="Share your story..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">How many hours will the pet be alone daily?</label>
            <select class="form-control" id="f-hours">
              <option>Less than 4 hours</option>
              <option>4-8 hours</option>
              <option>More than 8 hours</option>
            </select>
          </div>
        </div>

        <div class="form-section">
          <h2>📞 References</h2>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Reference Name</label>
              <input class="form-control" id="f-ref-name" placeholder="Friend/Family member name"/>
            </div>
            <div class="form-group">
              <label class="form-label">Reference Phone</label>
              <input class="form-control" id="f-ref-phone" placeholder="+91 XXXXXXXXXX"/>
            </div>
          </div>
        </div>

        <div style="text-align:center">
          <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
            Submit Application 🐾
          </button>
          <p style="font-size:0.85rem;color:var(--brown-light);margin-top:0.8rem">The shelter will review and contact you within 2-3 business days</p>
        </div>
      </form>`;

    document.getElementById('adoption-form').addEventListener('submit', submitApplication);
  }

  async function submitApplication(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Submitting...';
    btn.disabled = true;

    try {
      await db.collection('applications').add({
        userId: currentUser.uid,
        userEmail: currentUser.email,
        petId: petId,
        petName: petData.name,
        shelterId: petData.shelterId,
        shelterName: petData.shelterName,
        status: 'Submitted',
        applicantName: document.getElementById('f-name').value,
        applicantAge: document.getElementById('f-age').value,
        phone: document.getElementById('f-phone').value,
        email: document.getElementById('f-email').value,
        homeType: document.getElementById('f-home-type').value,
        yard: document.getElementById('f-yard').value,
        address: document.getElementById('f-address').value,
        landlordOk: document.getElementById('f-landlord').value,
        prevPet: document.getElementById('f-prev-pet').value,
        reason: document.getElementById('f-reason').value,
        hoursAlone: document.getElementById('f-hours').value,
        refName: document.getElementById('f-ref-name').value,
        refPhone: document.getElementById('f-ref-phone').value,
        submittedAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      document.getElementById('apply-wrap').innerHTML = `
        <div class="success-card">
          <div class="success-icon">🎉</div>
          <h2>Application Submitted!</h2>
          <p>Your application to adopt <strong>${petData.name}</strong> has been sent to <strong>${petData.shelterName}</strong>. They will review and contact you soon!</p>
          <a href="browse.html" class="btn btn-primary">Browse More Pets</a>
          &nbsp;
          <a href="my-applications.html" class="btn btn-outline">View My Applications</a>
        </div>`;
    } catch(err) {
      showToast('Error submitting: ' + err.message, 'error');
      btn.textContent = 'Submit Application 🐾';
      btn.disabled = false;
    }
  }

  init();
</script>
</body>
</html>
