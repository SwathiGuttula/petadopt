<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – PetAdopt</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .auth-page { min-height: 100vh; background: linear-gradient(135deg, #FFF8F0, #E0F2F1); display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .auth-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow-hover); padding: 2.5rem; width: 100%; max-width: 480px; }
    .auth-header { text-align: center; margin-bottom: 2rem; }
    .auth-logo { font-size: 3rem; margin-bottom: 0.5rem; }
    .auth-header h1 { font-size: 1.8rem; color: var(--brown); }
    .auth-header p { color: var(--brown-light); font-size: 0.9rem; }
    .role-selector { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .role-option { flex: 1; border: 2px solid #E0D6CE; border-radius: var(--radius-sm); padding: 1rem; text-align: center; cursor: pointer; transition: all 0.2s; }
    .role-option.selected { border-color: var(--orange); background: var(--orange-pale); }
    .role-option .role-icon { font-size: 1.8rem; margin-bottom: 0.3rem; }
    .role-option .role-name { font-weight: 700; font-size: 0.9rem; color: var(--brown); }
    .role-option .role-desc { font-size: 0.78rem; color: var(--brown-light); }
    .error-msg { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--brown-light); }
    .auth-footer a { color: var(--orange); font-weight: 700; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🐾</div>
      <h1>Join PetAdopt</h1>
      <p>Create your account and start your journey</p>
    </div>

    <p style="font-weight:700;color:var(--brown);margin-bottom:0.8rem">I am registering as...</p>
    <div class="role-selector">
      <div class="role-option selected" data-role="adopter" onclick="selectRole('adopter',this)">
        <div class="role-icon">🏠</div>
        <div class="role-name">Adopter</div>
        <div class="role-desc">Looking to adopt</div>
      </div>
      <div class="role-option" data-role="shelter" onclick="selectRole('shelter',this)">
        <div class="role-icon">🏡</div>
        <div class="role-name">Shelter</div>
        <div class="role-desc">Managing pets</div>
      </div>
    </div>

    <form id="register-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="Your name" required/>
        </div>
        <div class="form-group" id="shelter-name-group" style="display:none">
          <label class="form-label">Shelter Name</label>
          <input type="text" id="shelter-name" class="form-control" placeholder="Shelter name"/>
        </div>
        <div class="form-group" id="phone-group">
          <label class="form-label">Phone</label>
          <input type="tel" id="phone" class="form-control" placeholder="+91 9876543210"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required minlength="6"/>
      </div>
      <div class="form-group">
        <label class="form-label">City / Location</label>
        <input type="text" id="location" class="form-control" placeholder="e.g. Hyderabad"/>
      </div>
      <p class="error-msg" id="error-msg"></p>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem" id="reg-btn">
        Create Account 🐾
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
  let selectedRole = 'adopter';

  function selectRole(role, el) {
    selectedRole = role;
    document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('shelter-name-group').style.display = role === 'shelter' ? 'block' : 'none';
  }

  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    const errorMsg = document.getElementById('error-msg');
    btn.textContent = 'Creating account...';
    btn.disabled = true;
    errorMsg.style.display = 'none';

    try {
      const cred = await auth.createUserWithEmailAndPassword(
        document.getElementById('email').value,
        document.getElementById('password').value
      );

      await db.collection('users').doc(cred.user.uid).set({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        location: document.getElementById('location').value,
        role: selectedRole,
        shelterName: document.getElementById('shelter-name').value || '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      if (selectedRole === 'shelter') window.location.href = 'shelter-dashboard.html';
      else window.location.href = '../index.html';
    } catch(err) {
      errorMsg.textContent = err.message;
      errorMsg.style.display = 'block';
      btn.textContent = 'Create Account 🐾';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
