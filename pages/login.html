<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – PetAdopt</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .auth-page {
      min-height: 100vh;
      background: linear-gradient(135deg, #FFF8F0, #E0F2F1);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .auth-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow-hover);
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
    }
    .auth-header { text-align: center; margin-bottom: 2rem; }
    .auth-logo { font-size: 3rem; margin-bottom: 0.5rem; }
    .auth-header h1 { font-size: 1.8rem; color: var(--brown); }
    .auth-header p { color: var(--brown-light); font-size: 0.9rem; }
    .divider-text {
      text-align: center;
      color: var(--brown-light);
      font-size: 0.85rem;
      margin: 1rem 0;
      position: relative;
    }
    .divider-text::before, .divider-text::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: var(--orange-pale);
    }
    .divider-text::before { left: 0; }
    .divider-text::after { right: 0; }
    .google-btn {
      width: 100%;
      padding: 12px;
      border: 2px solid #E0D6CE;
      border-radius: var(--radius-sm);
      background: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--brown);
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 1rem;
    }
    .google-btn:hover { border-color: var(--orange); box-shadow: 0 2px 8px rgba(255,112,67,0.15); }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--brown-light); }
    .auth-footer a { color: var(--orange); font-weight: 700; }
    .error-msg { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; display: none; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🐾</div>
      <h1>Welcome Back!</h1>
      <p>Sign in to continue your adoption journey</p>
    </div>

    <button class="google-btn" id="google-signin-btn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
      Continue with Google
    </button>

    <div class="divider-text">or sign in with email</div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Your password" required/>
      </div>
      <p class="error-msg" id="error-msg"></p>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem" id="login-btn">
        Sign In 🐾
      </button>
    </form>

    <div class="auth-footer">
      New to PetAdopt? <a href="register.html">Create an account</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
  const form = document.getElementById('login-form');
  const errorMsg = document.getElementById('error-msg');

  async function redirectAfterLogin(user) {
    const doc = await db.collection('users').doc(user.uid).get();
    const role = doc.data()?.role;
    if (role === 'shelter') window.location.href = 'shelter-dashboard.html';
    else if (role === 'admin') window.location.href = 'admin-dashboard.html';
    else window.location.href = '../index.html';
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.textContent = 'Signing in...';
    btn.disabled = true;
    errorMsg.style.display = 'none';
    try {
      const cred = await auth.signInWithEmailAndPassword(
        document.getElementById('email').value,
        document.getElementById('password').value
      );
      await redirectAfterLogin(cred.user);
    } catch(err) {
      errorMsg.textContent = err.message;
      errorMsg.style.display = 'block';
      btn.textContent = 'Sign In 🐾';
      btn.disabled = false;
    }
  });

  document.getElementById('google-signin-btn').addEventListener('click', async () => {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const cred = await auth.signInWithPopup(provider);
      // Create user doc if new
      const ref = db.collection('users').doc(cred.user.uid);
      const snap = await ref.get();
      if (!snap.exists) {
        await ref.set({ name: cred.user.displayName, email: cred.user.email, role: 'adopter', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      }
      await redirectAfterLogin(cred.user);
    } catch(err) {
      errorMsg.textContent = err.message;
      errorMsg.style.display = 'block';
    }
  });
</script>
</body>
</html>
